schema_version: 1

context:
  version: "1.8.1"
  python_min: "3.10"

package:
  name: agent-framework-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-core/agent_framework_core-${{ version }}.tar.gz
  sha256: d4c694603961cbe4df1f08c6a277a1617df489cd86a333d03763f2bf2a5f86bd

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - typing_extensions <5,>=4.15.0
    - pydantic <3,>=2
    - python-dotenv <2,>=1
    - opentelemetry-api <2,>=1.39.0

tests:
  - python:
      imports:
        - agent_framework
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Microsoft Agent Framework for building AI Agents with Python. This is the core package that has all the core abstractions and implementations.
  homepage: https://pypi.org/project/agent-framework-core/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
